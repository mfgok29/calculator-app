<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern web-based calculator with smooth animations">
    <title>Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="calculator">
        <div class="calculator-display" aria-live="polite">
            <div class="display-input" id="display-input"></div>
            <div class="display-result" id="display-result">0</div>
        </div>
        <div class="calculator-keypad">
            <button class="btn btn-clear" data-action="clear" aria-label="Clear">C</button>
            <button class="btn btn-operation" data-action="divide" aria-label="Divide">÷</button>
            <button class="btn btn-operation" data-action="multiply" aria-label="Multiply">×</button>
            <button class="btn btn-operation" data-action="delete" aria-label="Delete">⌫</button>

            <button class="btn btn-number" data-number="7" aria-label="7">7</button>
            <button class="btn btn-number" data-number="8" aria-label="8">8</button>
            <button class="btn btn-number" data-number="9" aria-label="9">9</button>
            <button class="btn btn-operation" data-action="subtract" aria-label="Subtract">−</button>

            <button class="btn btn-number" data-number="4" aria-label="4">4</button>
            <button class="btn btn-number" data-number="5" aria-label="5">5</button>
            <button class="btn btn-number" data-number="6" aria-label="6">6</button>
            <button class="btn btn-operation" data-action="add" aria-label="Add">+</button>

            <button class="btn btn-number" data-number="1" aria-label="1">1</button>
            <button class="btn btn-number" data-number="2" aria-label="2">2</button>
            <button class="btn btn-number" data-number="3" aria-label="3">3</button>
            <button class="btn btn-equals" data-action="equals" aria-label="Equals">=</button>

            <button class="btn btn-zero" data-number="0" aria-label="0">0</button>
            <button class="btn btn-decimal" data-decimal="true" aria-label="Decimal point">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
